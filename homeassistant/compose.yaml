x-defaults: &defaults
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  homeassistant:
    <<: *defaults
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    image: lscr.io/linuxserver/homeassistant:2026.4.4@sha256:4ed7b20403117de0790ab69cad56d2404b3d8ac4fdbe05bfc47e8ff5ebe0c1f7
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - ./config:/config
  matter:
    <<: *defaults
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    image: ghcr.io/matter-js/python-matter-server:8.1.2@sha256:6827e352011e2d8c2bde771e446fcf72acc49150ef66bad978816bac1762aad3
    network_mode: host
    volumes:
      - ./matter:/data
