services:
  mc:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "24454:24454/udp"
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "26.1"
      MEMORY: "12288M"
      MAX_PLAYERS: "2"
      USE_MEOWICE_FLAGS: "true"
      TZ: "America/Los_Angeles"
      DIFFICULTY: "3"
      SIMULATION_DISTANCE: "16"
      VIEW_DISTANCE: "16"
      ENABLE_WHITELIST: "true"
      WHITELIST: |-
        eyeofgrey
        vi6ann
      ANNOUNCE_PLAYER_ACHIEVEMENTS: "true"
      LOG_TIMESTAMP: "true"
    volumes:
      - "./data:/data"
