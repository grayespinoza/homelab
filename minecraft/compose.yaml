services:
  mc:
    image: itzg/minecraft-server:2026.4.2-java25@sha256:13b19d4134d236de47320e937d456b38bbc148db2bbab4a81064a3e71dbe37ad
    restart: unless-stopped
    ports:
      - "25565:25565/tcp"
      - "24454:24454/udp"
    environment:
      EULA: "TRUE"
      TYPE: "FABRIC"
      VERSION: "26.1"
      MEMORY: "12288M"
      MAX_PLAYERS: "2"
      USE_MEOWICE_FLAGS: "true"
      TZ: "America/Los_Angeles"
      DIFFICULTY: "3"
      SIMULATION_DISTANCE: "16"
      VIEW_DISTANCE: "16"
      ENABLE_WHITELIST: "true"
      WHITELIST: |-
        eyeofgrey
        vi6ann
      ANNOUNCE_PLAYER_ACHIEVEMENTS: "true"
      LOG_TIMESTAMP: "true"
      MAX_TICK_TIME: "-1"
      ENABLE_AUTOPAUSE: "TRUE"
    volumes:
      - "./data:/data"
