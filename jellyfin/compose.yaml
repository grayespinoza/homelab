x-defaults: &defaults
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  jellyfin:
    <<: *defaults
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    image: lscr.io/linuxserver/jellyfin:10.11.8@sha256:7351868a3a340049503d25da65fae19c77ce3ea58f607f702cac65b6faeec898
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    volumes:
      - ./config:/config
      - ./media:/media:ro
