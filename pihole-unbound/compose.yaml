services:
  pihole-unbound:
    image: mpgirro/pihole-unbound:2026.04.0
    hostname: ${HOSTNAME}
    domainname: ${DOMAIN_NAME}
    restart: unless-stopped
    ports:
      - 443:443/tcp
      - 53:53/tcp
      - 53:53/udp
      - ${PIHOLE_WEBPORT:-80}:${PIHOLE_WEBPORT:-80}/tcp
    environment:
      - TZ=America/Los_Angeles
      - FTLCONF_webserver_api_password=${WEBPASSWORD}
      - FTLCONF_webserver_interface_theme=${WEBTHEME:-default-light}
      - FTLCONF_dns_revServers=${REV_SERVER:-false},${REV_SERVER_CIDR},${REV_SERVER_TARGET},${REV_SERVER_DOMAIN}
      - FTLCONF_dns_upstreams=127.0.0.1#5335
      - FTLCONF_dns_dnssec="true"
      - FTLCONF_dns_listeningMode=single
      - FTLCONF_webserver_port=${PIHOLE_WEBPORT}
    volumes:
      - etc_pihole-unbound:/etc/pihole:rw
      - etc_pihole_dnsmasq-unbound:/etc/dnsmasq.d:rw

volumes:
  etc_pihole-unbound:
  etc_pihole_dnsmasq-unbound:
