x-defaults: &defaults
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  read_only: true
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  uptime-kuma:
    <<: *defaults
    tmpfs:
      - /tmp
    image: louislam/uptime-kuma:2.3.2@sha256:9aeb4e51d038047f414309c77a1af553281ca535723cb88907d907269d0a908e
    user: 1000:1000
    ports:
      - "3001:3001/tcp"
    volumes:
      - ./data:/app/data
